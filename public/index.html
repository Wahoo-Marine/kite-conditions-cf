<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪁 Kite Conditions</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <h1>🪁 Kite Conditions</h1>
  <div class="subtitle">Wind forecasts for your favorite spots</div>
</header>

<nav>
  <a href="/" class="active">Dashboard</a>
  <a href="/settings">Settings</a>
</nav>

<div id="loading-overlay">
  <div style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div style="margin-top:1rem;color:var(--text-muted);font-size:.85rem;" id="loading-msg">Loading forecasts…</div>
</div>

<div class="container" id="app" style="display:none;">
  <!-- Date Range Picker -->
  <div class="range-picker" id="range-picker">
    <div class="range-field">
      <label for="start-date">From</label>
      <input type="date" id="start-date">
    </div>
    <span class="range-dash">–</span>
    <div class="range-field">
      <label for="end-date">To</label>
      <input type="date" id="end-date">
    </div>
    <button class="range-btn" id="btn-today" title="Reset to today → 7 days">Today</button>
    <span class="cache-badge" id="cache-badge" style="display:none;margin-left:auto;"></span>
  </div>

  <!-- Grid Table -->
  <div class="overview">
    <div class="grid-wrap">
      <table class="grid-table" id="grid-table">
        <thead id="grid-head"></thead>
        <tbody id="grid-body"></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  Powered by <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> •
  Data refreshes every 15 min
</footer>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ── Date helpers ─────────────────────
function fmtDate(d) { return d.toISOString().slice(0, 10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function clampDate(d, lo, hi) { return d < lo ? lo : d > hi ? hi : d; }

const todayDate = new Date();
todayDate.setHours(0, 0, 0, 0);
const maxDate = addDays(todayDate, 15);

let startDate = localStorage.getItem('kite_start') || fmtDate(todayDate);
let endDate   = localStorage.getItem('kite_end')   || fmtDate(addDays(todayDate, 6));

// ── Init ──────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initRangePicker();
  loadDashboard();
});

// ── Range Picker ──────────────────────
function initRangePicker() {
  const sEl = $('#start-date');
  const eEl = $('#end-date');
  const minStr = fmtDate(todayDate);
  const maxStr = fmtDate(maxDate);

  sEl.min = minStr; sEl.max = maxStr;
  eEl.min = minStr; eEl.max = maxStr;

  // Clamp stored dates into valid range
  startDate = fmtDate(clampDate(new Date(startDate + 'T00:00:00'), todayDate, maxDate));
  endDate   = fmtDate(clampDate(new Date(endDate   + 'T00:00:00'), todayDate, maxDate));
  if (endDate < startDate) endDate = startDate;

  sEl.value = startDate;
  eEl.value = endDate;

  sEl.addEventListener('change', () => {
    startDate = sEl.value;
    if (endDate < startDate) { endDate = startDate; eEl.value = endDate; }
    persist(); loadDashboard();
  });
  eEl.addEventListener('change', () => {
    endDate = eEl.value;
    if (startDate > endDate) { startDate = endDate; sEl.value = startDate; }
    persist(); loadDashboard();
  });

  $('#btn-today').addEventListener('click', () => {
    startDate = fmtDate(todayDate);
    endDate   = fmtDate(addDays(todayDate, 6));
    sEl.value = startDate;
    eEl.value = endDate;
    persist(); loadDashboard();
  });
}

function persist() {
  localStorage.setItem('kite_start', startDate);
  localStorage.setItem('kite_end', endDate);
}

// ── Load Dashboard ────────────────────
async function loadDashboard() {
  showLoading(true);
  try {
    const res = await fetch(`/api/forecast?start=${startDate}&end=${endDate}`);
    if (!res.ok) throw new Error('Failed to load forecast');
    const data = await res.json();
    renderGrid(data);
    updateCacheBadge(data);
  } catch (err) {
    console.error(err);
    $('#grid-body').innerHTML = `<tr><td colspan="99" style="text-align:center;padding:2rem;color:var(--text-muted);">Failed to load — ${err.message}</td></tr>`;
  } finally {
    showLoading(false);
  }
}

// ── Render Grid ───────────────────────
function renderGrid(data) {
  const { days_grid, spots } = data;
  if (!days_grid || days_grid.length === 0 || !spots || spots.length === 0) {
    $('#grid-body').innerHTML = '<tr><td colspan="99" style="text-align:center;padding:2rem;">No forecast data available.</td></tr>';
    return;
  }

  // Build a lookup: spotId -> { date -> dayData }
  const spotDaysMap = {};
  spots.forEach(s => {
    const byDate = {};
    (s.days || []).forEach(d => { byDate[d.date] = d; });
    spotDaysMap[s.id] = byDate;
  });

  // Header
  let headHTML = '<tr><th class="spot-cell">Spot</th>';
  days_grid.forEach(d => {
    headHTML += `<th><div class="th-day">${d.day_short}</div><div class="th-date">${d.month_day}</div></th>`;
  });
  headHTML += '</tr>';
  $('#grid-head').innerHTML = headHTML;

  // Body — spots already sorted by avg wind from API
  let bodyHTML = '';

  spots.forEach(spot => {
    bodyHTML += `<tr onclick="location.href='/spot?id=${spot.id}'">`;
    bodyHTML += `<td class="spot-cell">${esc(spot.name)}</td>`;

    days_grid.forEach(dayInfo => {
      const sd = spotDaysMap[spot.id]?.[dayInfo.date];
      if (!sd || sd.avg_wind == null) {
        bodyHTML += '<td class="grid-cell"><span style="color:var(--text-muted);font-size:.7rem;">—</span></td>';
        return;
      }

      const rClass = ratingClass(sd.rating);
      const gustClass = gustColorClass(sd.max_gust);
      const tempColor = tempColorStyle(sd.avg_temp);
      // Dominant weather icon from first hour or empty
      const wIcon = sd.hours && sd.hours.length > 0 ? (sd.hours[Math.floor(sd.hours.length/2)]?.sky_icon || '') : '';

      bodyHTML += '<td class="grid-cell">';
      bodyHTML += `<div class="gc-wind" style="color:${windColor(sd.avg_wind)}">${Math.round(sd.avg_wind)} mph</div>`;
      bodyHTML += `<div class="gc-gust ${gustClass}">G ${Math.round(sd.max_gust)}</div>`;
      bodyHTML += `<div class="gc-temp">${wIcon} <span style="${tempColor}">${Math.round(sd.avg_temp)}°F</span></div>`;
      bodyHTML += `<div class="gc-rating ${rClass}">${sd.rating_label}</div>`;

      // Tide H/L summary (compact)
      if (sd.tide && sd.tide.extremes && sd.tide.extremes.length > 0) {
        bodyHTML += '<div class="gc-tide">';
        sd.tide.extremes.slice(0, 4).forEach(e => {
          const icon = e.type === 'H' ? '▲' : '▼';
          const cls = e.type === 'H' ? 'tide-hi' : 'tide-lo';
          bodyHTML += `<span class="${cls}">${icon}${e.time.slice(0,5)}</span> `;
        });
        bodyHTML += '</div>';
      }

      // Hour dots
      if (sd.hours && sd.hours.length > 0) {
        bodyHTML += '<div class="hour-dots">';
        sd.hours.forEach(hr => {
          const cls = ratingClass(hr.rating);
          bodyHTML += `<div class="hour-dot ${cls}" title="${hr.time}: ${hr.wind} mph G${hr.gust} ${hr.dir}"></div>`;
        });
        bodyHTML += '</div>';
      }
      bodyHTML += '</td>';
    });

    bodyHTML += '</tr>';
  });

  $('#grid-body').innerHTML = bodyHTML;
}

// ── Cache Badge ───────────────────────
function updateCacheBadge(data) {
  const badge = $('#cache-badge');
  badge.style.display = 'inline-block';
  if (data.all_cached) {
    const mins = Math.floor((data.cache_age || 0) / 60);
    badge.className = 'cache-badge cached';
    badge.textContent = mins > 0 ? `📦 Cached ${mins}m ago` : '📦 Cached';
  } else {
    badge.className = 'cache-badge fresh';
    badge.textContent = '⚡ Fresh data';
  }
}

// ── Helpers ───────────────────────────
function ratingClass(r) {
  if (r === 'send-it') return 'send-it';
  if (r === 'maybe') return 'maybe';
  return 'nope';
}

function gustColorClass(gust) {
  if (gust < 25) return 'gust-low';
  if (gust < 35) return 'gust-med';
  return 'gust-high';
}

function windColor(w) {
  if (w >= 15) return 'var(--send-it)';
  if (w >= 12) return 'var(--maybe)';
  return 'var(--text-muted)';
}

function tempColorStyle(f) {
  if (f >= 80) return 'color:#ef4444';
  if (f >= 70) return 'color:#eab308';
  return '';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showLoading(on) {
  $('#loading-overlay').classList.toggle('hidden', !on);
  $('#app').style.display = on ? 'none' : 'block';
}
</script>
</body>
</html>
