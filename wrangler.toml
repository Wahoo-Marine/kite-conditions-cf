name = "kite-conditions"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./public"

# D1 Database — stores spots + user preferences
[[d1_databases]]
binding = "DB"
database_name = "kite-conditions-db"
database_id = "placeholder-will-be-replaced-after-deploy"

# KV Namespace — caches Open-Meteo forecast responses
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-will-be-replaced-after-deploy"
